<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>RK86 tape WAV visualizer</title>
<style>
  :root {
    --bg: #15171c;
    --panel: #1c1f27;
    --panel-2: #232732;
    --line: #2c313d;
    --fg: #d6dae3;
    --muted: #7a818f;
    --accent: #5fb6ff;
    --good: #5fd07a;
    --bad: #ff6b6b;

    --r-prolog: #2a3242;
    --r-sync:   #c97a2a;
    --r-header: #4a6dbe;
    --r-data:   #2f7a4f;
    --r-gap:    #3a3a3a;
    --r-trailer:#a44dbb;
    --r-cksum:  #b58b00;
    --r-tail:   #444c5c;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--fg); font: 13px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, sans-serif; }
  body { display:flex; flex-direction:column; height:100vh; }
  header { padding: 10px 14px; border-bottom: 1px solid var(--line); display:flex; gap:14px; align-items:center; flex-wrap:wrap; }
  header h1 { font-size: 14px; margin:0; font-weight: 600; }
  header .meta { color: var(--muted); font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }
  header .ok  { color: var(--good); }
  header .err { color: var(--bad); }
  header button, header label.btn {
    background: var(--panel-2); color: var(--fg); border: 1px solid var(--line);
    padding: 5px 10px; border-radius: 6px; cursor: pointer; font: inherit;
  }
  header button:hover, header label.btn:hover { background: #2c313d; }

  #drop {
    flex: 0 0 auto;
    margin: 14px;
    border: 2px dashed var(--line);
    border-radius: 10px;
    padding: 26px;
    text-align: center;
    color: var(--muted);
    transition: background .12s, border-color .12s;
  }
  #drop.over { background: var(--panel); border-color: var(--accent); color: var(--fg); }
  #drop input { display:none; }

  #regionBar {
    height: 22px;
    margin: 6px 14px 0;
    border: 1px solid var(--line);
    border-radius: 4px;
    position: relative;
    background: var(--panel);
    overflow: hidden;
    flex: 0 0 auto;
  }
  #regionBar .seg {
    position: absolute; top:0; bottom:0;
    border-right: 1px solid rgba(0,0,0,.35);
    cursor: pointer;
    overflow: hidden;
    white-space: nowrap;
    font: 11px ui-monospace, Menlo, monospace;
    color: rgba(255,255,255,.92);
    padding: 3px 4px;
    text-shadow: 0 1px 0 rgba(0,0,0,.4);
  }
  #regionBar .viewport {
    position: absolute; top: -1px; bottom: -1px;
    border: 2px solid var(--accent);
    border-radius: 3px;
    pointer-events: none;
    box-shadow: 0 0 0 9999px rgba(0,0,0,.0);
  }

  #stage {
    flex: 1 1 auto;
    display: flex;
    min-height: 0;
  }
  #leftPane {
    flex: 1 1 60%;
    display: flex;
    flex-direction: column;
    min-width: 0;
    border-right: 1px solid var(--line);
  }
  #rightPane {
    flex: 1 1 40%;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  #waveWrap {
    flex: 1 1 auto;
    position: relative;
    margin: 6px 14px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--panel);
    overflow: hidden;
  }
  #wave { display:block; width:100%; height:100%; cursor: grab; }
  #wave.dragging { cursor: grabbing; }
  #ruler {
    height: 22px;
    margin: 0 14px 6px;
    border-bottom: 1px solid var(--line);
    color: var(--muted);
    font: 11px ui-monospace, Menlo, monospace;
    position: relative;
  }
  #zoomControls {
    position: absolute; right: 22px; top: 12px;
    display: flex; gap: 4px;
    background: rgba(0,0,0,.4);
    padding: 4px;
    border-radius: 6px;
  }
  #zoomControls button {
    background: var(--panel-2); color:var(--fg); border:1px solid var(--line);
    border-radius: 4px; padding: 2px 8px; font: 12px ui-monospace, Menlo, monospace; cursor:pointer;
  }
  #tooltip {
    position: absolute; pointer-events: none;
    background: rgba(20, 23, 30, .95);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 5px 8px;
    font: 11px ui-monospace, Menlo, monospace;
    color: var(--fg);
    white-space: pre;
    transform: translate(8px, 8px);
    z-index: 10;
    display: none;
  }

  #legend {
    margin: 0 14px 6px;
    display: flex; flex-wrap: wrap; gap: 4px 12px;
    font: 11px ui-monospace, Menlo, monospace;
    color: var(--muted);
  }
  #legend .sw { display:inline-block; width:10px; height:10px; border-radius:2px; margin-right:4px; vertical-align:middle; }

  #hex {
    flex: 1 1 auto;
    overflow: auto;
    margin: 6px 14px;
    border: 1px solid var(--line);
    border-radius: 6px;
    background: var(--panel);
    padding: 8px 10px;
    font: 12px/1.45 ui-monospace, "SF Mono", Menlo, monospace;
    white-space: pre;
  }
  #hex .row { display: flex; gap: 14px; }
  #hex .off { color: var(--muted); }
  #hex .b { padding: 0 2px; border-radius: 2px; cursor: pointer; }
  #hex .b:hover { outline: 1px solid var(--accent); }
  #hex .b.sel { outline: 2px solid var(--accent); }
  #hex .ascii { color: var(--muted); }
  #hex .ascii .a { padding: 0 0px; cursor: pointer; }

  .status { color: var(--muted); }
  .status.err { color: var(--bad); }
  .status.ok { color: var(--good); }

  details { margin: 0 14px 8px; }
  details summary { cursor: pointer; color: var(--muted); }
</style>
</head>
<body>

<header>
  <h1>RK86 tape WAV visualizer</h1>
  <label class="btn"><input type="file" id="file" accept=".wav,audio/wav" /> Open WAV…</label>
  <span id="info" class="meta"></span>
  <span id="result" class="meta"></span>
</header>

<div id="drop">drop a .wav file anywhere on this page (or use the button above)</div>

<div id="regionBar" hidden></div>

<div id="legend" hidden>
  <span><i class="sw" style="background:var(--r-prolog)"></i>zero prologue</span>
  <span><i class="sw" style="background:var(--r-sync)"></i>E6 sync</span>
  <span><i class="sw" style="background:var(--r-header)"></i>header (start/end)</span>
  <span><i class="sw" style="background:var(--r-data)"></i>data</span>
  <span><i class="sw" style="background:var(--r-gap)"></i>00 00 gap</span>
  <span><i class="sw" style="background:var(--r-trailer)"></i>2nd E6</span>
  <span><i class="sw" style="background:var(--r-cksum)"></i>checksum</span>
  <span><i class="sw" style="background:var(--r-tail)"></i>trailing</span>
  <span style="margin-left:auto">wheel = zoom · drag = pan · click hex = scroll · double-click = reset</span>
</div>

<div id="stage" hidden>
  <div id="leftPane">
    <div id="waveWrap">
      <canvas id="wave"></canvas>
      <div id="zoomControls">
        <button data-z="0.5">−</button>
        <button data-z="2">+</button>
        <button data-z="reset">⤺</button>
      </div>
      <div id="tooltip"></div>
    </div>
    <div id="ruler"></div>
  </div>
  <div id="rightPane">
    <div id="hex"></div>
  </div>
</div>

<script>
"use strict";

// ---------- WAV parsing (PCM 8-bit unsigned & 16-bit signed) ----------
function parseWav(buf) {
  const dv = new DataView(buf);
  const tag = (off) => String.fromCharCode(dv.getUint8(off), dv.getUint8(off+1), dv.getUint8(off+2), dv.getUint8(off+3));
  if (tag(0) !== "RIFF" || tag(8) !== "WAVE") throw new Error("not a WAV file");

  let off = 12;
  let fmt = null, dataOff = -1, dataLen = 0;
  while (off + 8 <= dv.byteLength) {
    const id = tag(off);
    const sz = dv.getUint32(off + 4, true);
    if (id === "fmt ") {
      fmt = {
        format: dv.getUint16(off + 8, true),
        channels: dv.getUint16(off + 10, true),
        sampleRate: dv.getUint32(off + 12, true),
        bitsPerSample: dv.getUint16(off + 22, true),
      };
    } else if (id === "data") {
      dataOff = off + 8;
      dataLen = sz;
      break;
    }
    off += 8 + sz + (sz & 1);
  }
  if (!fmt || dataOff < 0) throw new Error("missing fmt/data chunk");
  if (fmt.format !== 1) throw new Error("only PCM (format=1) supported, got " + fmt.format);

  const ch = fmt.channels;
  const bps = fmt.bitsPerSample;
  let samples;

  if (bps === 8) {
    // unsigned 8-bit, range 0..255
    const N = Math.floor(dataLen / ch);
    samples = new Uint8Array(N);
    for (let i = 0; i < N; i++) samples[i] = dv.getUint8(dataOff + i * ch); // channel 0
  } else if (bps === 16) {
    // signed 16-bit, map to 0..255 for parity with python `list(frames)` on 8-bit files
    // (16-bit files: take the high byte and shift to unsigned)
    const N = Math.floor(dataLen / (2 * ch));
    samples = new Uint8Array(N);
    for (let i = 0; i < N; i++) {
      const s = dv.getInt16(dataOff + i * 2 * ch, true);
      samples[i] = ((s >> 8) + 128) & 0xff;
    }
  } else {
    throw new Error("unsupported bit depth: " + bps);
  }
  return { sampleRate: fmt.sampleRate, channels: ch, bitsPerSample: bps, samples };
}

// ---------- Decoder (instrumented port of main.py / main.js) ----------
const BIT_RATE = 1100;
const THRESHOLD = 0x80;

function decode(samples, sampleRate) {
  const SAMPLES_PER_BIT = sampleRate / BIT_RATE;
  const STEP = Math.floor(SAMPLES_PER_BIT * 0.75);

  // events
  const transitions = [];      // sample index of every detected transition
  const bits = [];             // { pos: sampleIdx, value: 0|1 }
  let i = 0;

  function getBit() {
    if (i >= samples.length) return null;
    const v = samples[i];
    while (i < samples.length && samples[i] === v) i++;
    if (i >= samples.length) return null;
    const bit = samples[i] >= THRESHOLD ? 1 : 0;
    transitions.push(i);
    bits.push({ pos: i, value: bit });
    i += STEP;
    return bit;
  }

  // Seek E6 sync byte
  let byte = 0;
  let preBits = 0;
  let syncFound = false;
  while (true) {
    const b = getBit();
    if (b === null) break;
    byte = ((byte << 1) | b) & 0xff;
    preBits++;
    if (byte === 0xe6) { syncFound = true; break; }
  }

  const decoded = [];
  if (syncFound) {
    // Continue reading whole bytes
    while (true) {
      let by = 0;
      let ok = true;
      for (let j = 7; j >= 0; j--) {
        const b = getBit();
        if (b === null) { ok = false; break; }
        by |= b << j;
      }
      if (!ok) break;
      decoded.push(by);
    }
  }

  return { samplesPerBit: SAMPLES_PER_BIT, transitions, bits, syncFound, preBits, decoded };
}

function rk86Checksum(v) {
  let sum = 0, j = 0;
  while (j < v.length - 1) {
    const c = v[j];
    sum = (sum + c + (c << 8)) & 0xffff;
    j++;
  }
  const sumH = sum & 0xff00, sumL = sum & 0xff;
  return sumH | ((sumL + v[j]) & 0xff);
}

// Classify decoded bytes into structural roles: header (4) / data (size) / gap (00 00) / trailer (E6) / cksum (2) / tail
function classify(decoded) {
  const roles = new Array(decoded.length).fill("tail");
  const result = { ok: false, start: null, end: null, size: null, checksum: null, actualChecksum: null, error: null };
  if (decoded.length < 4 + 0 + 2 + 1 + 2) {
    result.error = "stream too short";
    return { roles, result };
  }
  const start = (decoded[0] << 8) | decoded[1];
  const end   = (decoded[2] << 8) | decoded[3];
  const size = end - start + 1;
  result.start = start; result.end = end; result.size = size;
  if (size <= 0 || 4 + size + 5 > decoded.length) {
    result.error = `bad size ${size} for stream of ${decoded.length} bytes`;
    return { roles, result };
  }
  for (let k = 0; k < 4; k++) roles[k] = "header";
  for (let k = 0; k < size; k++) roles[4 + k] = "data";
  roles[4 + size] = "gap";
  roles[4 + size + 1] = "gap";
  roles[4 + size + 2] = "trailer";
  roles[4 + size + 3] = "cksum";
  roles[4 + size + 4] = "cksum";
  const trailer0 = (decoded[4 + size] << 8) | decoded[4 + size + 1];
  const trailerE6 = decoded[4 + size + 2];
  const cksum = (decoded[4 + size + 3] << 8) | decoded[4 + size + 4];
  result.checksum = cksum;
  result.actualChecksum = rk86Checksum(decoded.slice(4, 4 + size));
  if (trailer0 !== 0x0000) result.error = `trailer0 ${trailer0.toString(16)} != 0000`;
  else if (trailerE6 !== 0xe6) result.error = `trailerE6 ${trailerE6.toString(16)} != E6`;
  else if (result.actualChecksum !== cksum) result.error = `checksum ${result.actualChecksum.toString(16)} != ${cksum.toString(16)}`;
  else result.ok = true;
  return { roles, result };
}

// ---------- App state ----------
const ROLE_COLORS = {
  prolog:  "#2a3242",
  sync:    "#c97a2a",
  header:  "#4a6dbe",
  data:    "#2f7a4f",
  gap:     "#3a3a3a",
  trailer: "#a44dbb",
  cksum:   "#b58b00",
  tail:    "#444c5c",
};
const ROLE_LABEL = {
  prolog: "prologue",
  sync: "E6 sync",
  header: "header",
  data: "data",
  gap: "00 00",
  trailer: "2nd E6",
  cksum: "checksum",
  tail: "trailing",
};

let APP = null; // active loaded session

function loadFile(buf, name) {
  let wav;
  try { wav = parseWav(buf); }
  catch (e) {
    document.getElementById("info").innerHTML = `<span class="err">${name}: ${e.message}</span>`;
    return;
  }
  const dec = decode(wav.samples, wav.sampleRate);

  // Build per-byte structures with sample positions.
  // bit 0 (after sync E6 found) = bits[preBits]
  // each subsequent decoded byte uses 8 bits.
  // We want per-byte spans: startPos = position of first bit in the byte, endPos = position of byte-end (= start of next byte = bit.pos + STEP)
  const STEP = Math.floor(wav.sampleRate / BIT_RATE * 0.75);
  const bytes = [];
  let bitIdx = 0;

  // Phantom "prologue" byte spanning bits 0..preBits-9 (everything before the E6 sync window)
  // The sync E6 itself is the last 8 bits of the seek phase: bits[preBits-8 .. preBits-1].
  if (dec.syncFound) {
    if (dec.preBits > 8) {
      const startB = dec.bits[0];
      const endB = dec.bits[dec.preBits - 9];
      bytes.push({
        role: "prolog",
        startPos: startB.pos,
        endPos: endB ? (endB.pos + STEP) : startB.pos,
        bitFrom: 0, bitTo: dec.preBits - 9,
        value: null,
      });
    }
    // E6 sync byte
    const syncStart = dec.bits[dec.preBits - 8];
    const syncEnd   = dec.bits[dec.preBits - 1];
    bytes.push({
      role: "sync",
      startPos: syncStart.pos,
      endPos: syncEnd.pos + STEP,
      bitFrom: dec.preBits - 8, bitTo: dec.preBits - 1,
      value: 0xe6,
    });
    bitIdx = dec.preBits;
  }

  const { roles, result } = classify(dec.decoded);
  for (let k = 0; k < dec.decoded.length; k++) {
    const startB = dec.bits[bitIdx];
    const endB   = dec.bits[bitIdx + 7];
    if (!startB || !endB) break;
    bytes.push({
      role: roles[k] || "tail",
      startPos: startB.pos,
      endPos: endB.pos + STEP,
      bitFrom: bitIdx, bitTo: bitIdx + 7,
      value: dec.decoded[k],
      decodedIndex: k,
    });
    bitIdx += 8;
  }

  APP = {
    name, wav, dec, bytes, result,
    view: { x0: 0, x1: wav.samples.length },
    selected: -1,
  };

  // Header info
  const sec = (wav.samples.length / wav.sampleRate).toFixed(2);
  document.getElementById("info").innerHTML =
    `<b>${name}</b>  ·  ${wav.sampleRate} Hz, ${wav.bitsPerSample}-bit, ${wav.channels}ch  ·  ${wav.samples.length} samples (${sec}s)  ·  decoded ${dec.decoded.length} bytes`;

  let res = "";
  if (!dec.syncFound) res = `<span class="err">no E6 sync byte found</span>`;
  else if (result.error) res = `<span class="err">decode error: ${result.error}</span>`;
  else res = `<span class="ok">OK · range ${hex16(result.start)}-${hex16(result.end)} (size ${hex16(result.size)}) · checksum ${hex16(result.checksum)}</span>`;
  document.getElementById("result").innerHTML = res;

  document.getElementById("drop").hidden = true;
  document.getElementById("regionBar").hidden = false;
  document.getElementById("legend").hidden = false;
  document.getElementById("stage").hidden = false;

  renderRegionBar();
  renderHex();
  resizeCanvas();
  draw();
}

// ---------- Rendering helpers ----------
const hex2 = (v) => v.toString(16).padStart(2, "0").toUpperCase();
const hex4 = (v) => v.toString(16).padStart(4, "0").toUpperCase();
const hex8 = (v) => v.toString(16).padStart(8, "0").toUpperCase();
const hex16 = (v) => v.toString(16).padStart(4, "0").toUpperCase();

function renderRegionBar() {
  const el = document.getElementById("regionBar");
  el.innerHTML = "";
  if (!APP) return;
  const W = el.clientWidth;
  const total = APP.wav.samples.length;
  const segs = [];
  // group consecutive bytes with the same role
  let cur = null;
  for (const b of APP.bytes) {
    if (cur && cur.role === b.role) { cur.endPos = b.endPos; cur.count++; }
    else { cur = { role: b.role, startPos: b.startPos, endPos: b.endPos, count: 1 }; segs.push(cur); }
  }
  for (const s of segs) {
    const x = (s.startPos / total) * W;
    const w = Math.max(1, ((s.endPos - s.startPos) / total) * W);
    const div = document.createElement("div");
    div.className = "seg";
    div.style.left = x + "px";
    div.style.width = w + "px";
    div.style.background = ROLE_COLORS[s.role];
    div.title = `${ROLE_LABEL[s.role]} · ${s.count} byte(s)`;
    if (w > 60) div.textContent = `${ROLE_LABEL[s.role]}${s.count > 1 ? " ×" + s.count : ""}`;
    div.onclick = () => { centerView(s.startPos, s.endPos); };
    el.appendChild(div);
  }
  // viewport indicator
  const vp = document.createElement("div");
  vp.className = "viewport";
  vp.id = "vpIndicator";
  el.appendChild(vp);
  updateViewportIndicator();
}

function updateViewportIndicator() {
  const vp = document.getElementById("vpIndicator");
  if (!vp || !APP) return;
  const W = document.getElementById("regionBar").clientWidth;
  const total = APP.wav.samples.length;
  const x = (APP.view.x0 / total) * W;
  const w = ((APP.view.x1 - APP.view.x0) / total) * W;
  vp.style.left = x + "px";
  vp.style.width = w + "px";
}

function renderHex() {
  const el = document.getElementById("hex");
  el.innerHTML = "";
  if (!APP) return;
  const decoded = APP.dec.decoded;
  const bytesByDecodedIdx = new Map();
  for (const b of APP.bytes) if (b.decodedIndex !== undefined) bytesByDecodedIdx.set(b.decodedIndex, b);

  const COL = 16;
  for (let row = 0; row < decoded.length; row += COL) {
    const rowEl = document.createElement("div");
    rowEl.className = "row";
    const offEl = document.createElement("span");
    offEl.className = "off";
    offEl.textContent = hex8(row);
    rowEl.appendChild(offEl);

    const hexEl = document.createElement("span");
    let asciiStr = "";
    for (let c = 0; c < COL; c++) {
      const idx = row + c;
      if (idx >= decoded.length) {
        hexEl.appendChild(document.createTextNode("   "));
        asciiStr += " ";
        continue;
      }
      const v = decoded[idx];
      const span = document.createElement("span");
      span.className = "b";
      span.dataset.idx = idx;
      span.textContent = hex2(v);
      const meta = bytesByDecodedIdx.get(idx);
      if (meta) {
        span.style.background = ROLE_COLORS[meta.role];
        span.style.color = "#fff";
      }
      span.onclick = () => {
        if (!meta) return;
        APP.selected = idx;
        centerView(meta.startPos, meta.endPos);
        document.querySelectorAll("#hex .b.sel").forEach(n => n.classList.remove("sel"));
        span.classList.add("sel");
      };
      span.title = meta ? `${ROLE_LABEL[meta.role]}  byte #${idx}  sample ${meta.startPos}` : `byte #${idx}`;
      hexEl.appendChild(span);
      hexEl.appendChild(document.createTextNode(" "));
      asciiStr += (v >= 32 && v < 127) ? String.fromCharCode(v) : ".";
      if (c === 7) hexEl.appendChild(document.createTextNode(" "));
    }
    rowEl.appendChild(hexEl);

    const asciiEl = document.createElement("span");
    asciiEl.className = "ascii";
    asciiEl.textContent = "|" + asciiStr + "|";
    rowEl.appendChild(asciiEl);
    el.appendChild(rowEl);
  }
}

// ---------- Waveform canvas ----------
const canvas = document.getElementById("wave");
const ctx = canvas.getContext("2d");
const tooltip = document.getElementById("tooltip");

function resizeCanvas() {
  const w = canvas.clientWidth, h = canvas.clientHeight;
  const dpr = window.devicePixelRatio || 1;
  canvas.width = Math.max(1, Math.floor(w * dpr));
  canvas.height = Math.max(1, Math.floor(h * dpr));
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function sampleToX(s) {
  const W = canvas.clientWidth;
  return ((s - APP.view.x0) / (APP.view.x1 - APP.view.x0)) * W;
}
function xToSample(x) {
  const W = canvas.clientWidth;
  return APP.view.x0 + (x / W) * (APP.view.x1 - APP.view.x0);
}

function clampView() {
  const N = APP.wav.samples.length;
  let { x0, x1 } = APP.view;
  const span = x1 - x0;
  const minSpan = 8;
  if (x1 - x0 < minSpan) {
    const c = (x0 + x1) / 2;
    x0 = c - minSpan / 2; x1 = c + minSpan / 2;
  }
  if (x0 < 0) { x1 -= x0; x0 = 0; }
  if (x1 > N) { x0 -= (x1 - N); x1 = N; }
  if (x0 < 0) x0 = 0;
  APP.view.x0 = x0; APP.view.x1 = x1;
}

function centerView(s0, s1) {
  const cur = APP.view.x1 - APP.view.x0;
  const want = (s1 - s0) * 4;
  const span = Math.max(want, Math.min(cur, APP.wav.samples.length));
  const c = (s0 + s1) / 2;
  APP.view.x0 = c - span / 2;
  APP.view.x1 = c + span / 2;
  clampView();
  draw();
}

function draw() {
  if (!APP) return;
  const W = canvas.clientWidth, H = canvas.clientHeight;
  ctx.clearRect(0, 0, W, H);

  // background bands per byte role
  const samples = APP.wav.samples;
  const { x0, x1 } = APP.view;
  for (const b of APP.bytes) {
    if (b.endPos < x0 || b.startPos > x1) continue;
    const xa = sampleToX(b.startPos);
    const xb = sampleToX(b.endPos);
    ctx.fillStyle = ROLE_COLORS[b.role] + "66"; // semi-transparent
    ctx.fillRect(xa, 0, Math.max(1, xb - xa), H);
  }

  // waveform
  ctx.strokeStyle = "#a8c8ff";
  ctx.fillStyle = "#a8c8ff";
  ctx.lineWidth = 1;
  ctx.beginPath();
  const span = x1 - x0;
  const samplesPerPx = span / W;
  if (samplesPerPx > 1.5) {
    // envelope: min/max per pixel column
    for (let px = 0; px < W; px++) {
      const a = Math.max(0, Math.floor(x0 + px * samplesPerPx));
      const b = Math.min(samples.length - 1, Math.floor(x0 + (px + 1) * samplesPerPx));
      let mn = 255, mx = 0;
      for (let s = a; s <= b; s++) {
        const v = samples[s];
        if (v < mn) mn = v;
        if (v > mx) mx = v;
      }
      const yMin = (1 - mx / 255) * H;
      const yMax = (1 - mn / 255) * H;
      if (px === 0) ctx.moveTo(px, yMin);
      else ctx.lineTo(px, yMin);
      ctx.lineTo(px, yMax);
    }
    ctx.stroke();
  } else {
    // line through samples + dots
    const a = Math.max(0, Math.floor(x0));
    const b = Math.min(samples.length - 1, Math.ceil(x1));
    let started = false;
    for (let s = a; s <= b; s++) {
      const x = sampleToX(s);
      const y = (1 - samples[s] / 255) * H;
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
    if (samplesPerPx < 0.4) {
      for (let s = a; s <= b; s++) {
        const x = sampleToX(s);
        const y = (1 - samples[s] / 255) * H;
        ctx.beginPath();
        ctx.arc(x, y, 1.6, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // threshold line
  ctx.strokeStyle = "rgba(255,255,255,.18)";
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  const yT = (1 - 0x80 / 255) * H;
  ctx.moveTo(0, yT); ctx.lineTo(W, yT);
  ctx.stroke();
  ctx.setLineDash([]);

  // bit transitions (yellow ticks at top half) and bit-sample dots on the waveform
  if (samplesPerPx < 8) {
    ctx.strokeStyle = "rgba(255, 230, 120, .55)";
    ctx.fillStyle = "#ffe678";
    ctx.beginPath();
    for (const t of APP.dec.transitions) {
      if (t < x0 || t > x1) continue;
      const x = sampleToX(t);
      ctx.moveTo(x, 0); ctx.lineTo(x, H * 0.10);
    }
    ctx.stroke();
    if (samplesPerPx < 1.0) {
      for (const bt of APP.dec.bits) {
        if (bt.pos < x0 || bt.pos > x1) continue;
        const x = sampleToX(bt.pos);
        const y = (1 - APP.wav.samples[bt.pos] / 255) * H;
        ctx.beginPath();
        ctx.arc(x, y, 2.6, 0, Math.PI * 2);
        ctx.fill();
        // bit value label
        if (samplesPerPx < 0.5) {
          ctx.fillStyle = "#000";
          ctx.fillText(bt.value.toString(), x - 2, y - 6);
          ctx.fillStyle = "#ffe678";
        }
      }
    }
  }

  // byte boundaries (vertical) + labels at top
  ctx.font = "11px ui-monospace, Menlo, monospace";
  ctx.textBaseline = "top";
  ctx.fillStyle = "#fff";
  ctx.strokeStyle = "rgba(255,255,255,.55)";
  for (const b of APP.bytes) {
    if (b.startPos < x0 - 50 || b.startPos > x1 + 50) continue;
    const x = sampleToX(b.startPos);
    ctx.beginPath();
    ctx.moveTo(x, 0); ctx.lineTo(x, H);
    ctx.stroke();
    // label
    const w = sampleToX(b.endPos) - x;
    if (w > 22) {
      const label = b.value === null
        ? `${ROLE_LABEL[b.role]}`
        : `${hex2(b.value)}${b.role === "sync" || b.role === "trailer" ? " · " + ROLE_LABEL[b.role] : ""}`;
      ctx.fillStyle = "rgba(0,0,0,.55)";
      ctx.fillRect(x + 2, 2, Math.min(w - 4, ctx.measureText(label).width + 6), 14);
      ctx.fillStyle = "#fff";
      ctx.fillText(label, x + 5, 4);
    }
  }

  // selected byte highlight
  if (APP.selected >= 0) {
    const meta = APP.bytes.find(b => b.decodedIndex === APP.selected);
    if (meta) {
      const xa = sampleToX(meta.startPos);
      const xb = sampleToX(meta.endPos);
      ctx.strokeStyle = "#5fb6ff";
      ctx.lineWidth = 2;
      ctx.strokeRect(xa, 0, Math.max(2, xb - xa), H);
      ctx.lineWidth = 1;
    }
  }

  drawRuler();
  updateViewportIndicator();
}

function drawRuler() {
  const ruler = document.getElementById("ruler");
  ruler.innerHTML = "";
  if (!APP) return;
  const W = ruler.clientWidth;
  const sr = APP.wav.sampleRate;
  const t0 = APP.view.x0 / sr;
  const t1 = APP.view.x1 / sr;
  const span = t1 - t0;
  // pick a nice tick step
  const targetTicks = 8;
  const raw = span / targetTicks;
  const pow = Math.pow(10, Math.floor(Math.log10(raw)));
  const mant = raw / pow;
  let step;
  if (mant < 1.5) step = 1 * pow;
  else if (mant < 3) step = 2 * pow;
  else if (mant < 7) step = 5 * pow;
  else step = 10 * pow;
  const first = Math.ceil(t0 / step) * step;
  const decimals = step >= 1 ? 0 : Math.min(6, -Math.floor(Math.log10(step)));
  for (let t = first; t <= t1; t += step) {
    const x = ((t - t0) / span) * W;
    const tick = document.createElement("div");
    tick.style.position = "absolute";
    tick.style.left = x + "px";
    tick.style.top = "0";
    tick.style.transform = "translateX(-50%)";
    tick.textContent = t.toFixed(decimals) + "s";
    ruler.appendChild(tick);
  }
}

// ---------- Interactions ----------
let drag = null;
canvas.addEventListener("mousedown", (e) => {
  if (!APP) return;
  drag = { x: e.clientX, x0: APP.view.x0, x1: APP.view.x1 };
  canvas.classList.add("dragging");
});
window.addEventListener("mousemove", (e) => {
  if (!drag || !APP) return;
  const W = canvas.clientWidth;
  const dx = e.clientX - drag.x;
  const span = drag.x1 - drag.x0;
  const ds = -dx / W * span;
  APP.view.x0 = drag.x0 + ds;
  APP.view.x1 = drag.x1 + ds;
  clampView();
  draw();
});
window.addEventListener("mouseup", () => { drag = null; canvas.classList.remove("dragging"); });

canvas.addEventListener("wheel", (e) => {
  if (!APP) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const s = xToSample(x);
  const factor = Math.exp(e.deltaY * 0.001);
  const span = (APP.view.x1 - APP.view.x0) * factor;
  APP.view.x0 = s - (s - APP.view.x0) * factor;
  APP.view.x1 = APP.view.x0 + span;
  clampView();
  draw();
}, { passive: false });

canvas.addEventListener("dblclick", () => {
  if (!APP) return;
  APP.view.x0 = 0; APP.view.x1 = APP.wav.samples.length;
  draw();
});

canvas.addEventListener("mousemove", (e) => {
  if (!APP) { tooltip.style.display = "none"; return; }
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const s = Math.round(xToSample(x));
  if (s < 0 || s >= APP.wav.samples.length) { tooltip.style.display = "none"; return; }
  const t = (s / APP.wav.sampleRate);
  const v = APP.wav.samples[s];
  // find byte under cursor
  let info = `t = ${t.toFixed(5)}s\nsample = ${s}\nlevel = ${v} (0x${hex2(v)})`;
  // binary search by startPos
  let lo = 0, hi = APP.bytes.length - 1, hit = -1;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    const b = APP.bytes[mid];
    if (s < b.startPos) hi = mid - 1;
    else if (s > b.endPos) lo = mid + 1;
    else { hit = mid; break; }
  }
  if (hit >= 0) {
    const b = APP.bytes[hit];
    info += `\nrole = ${ROLE_LABEL[b.role]}`;
    if (b.value !== null) info += `\nbyte = 0x${hex2(b.value)}` + (b.decodedIndex !== undefined ? ` (#${b.decodedIndex})` : "");
  }
  tooltip.textContent = info;
  tooltip.style.left = x + "px";
  tooltip.style.top = y + "px";
  tooltip.style.display = "block";
});
canvas.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });

document.querySelectorAll("#zoomControls button").forEach(btn => {
  btn.onclick = () => {
    if (!APP) return;
    const z = btn.dataset.z;
    if (z === "reset") { APP.view.x0 = 0; APP.view.x1 = APP.wav.samples.length; }
    else {
      const f = parseFloat(z);
      const c = (APP.view.x0 + APP.view.x1) / 2;
      const span = (APP.view.x1 - APP.view.x0) / f;
      APP.view.x0 = c - span / 2; APP.view.x1 = c + span / 2;
    }
    clampView();
    draw();
  };
});

window.addEventListener("resize", () => {
  if (!APP) return;
  resizeCanvas();
  renderRegionBar();
  draw();
});

// ---------- File loading ----------
function readFile(file) {
  const fr = new FileReader();
  fr.onload = () => loadFile(fr.result, file.name);
  fr.readAsArrayBuffer(file);
}

document.getElementById("file").addEventListener("change", (e) => {
  if (e.target.files[0]) readFile(e.target.files[0]);
});

const drop = document.getElementById("drop");
function setDragOver(on) { drop.classList.toggle("over", on); }
["dragenter", "dragover"].forEach(ev => {
  document.addEventListener(ev, (e) => { e.preventDefault(); setDragOver(true); });
});
["dragleave", "drop"].forEach(ev => {
  document.addEventListener(ev, (e) => { e.preventDefault(); if (ev === "dragleave" && e.target !== drop) return; setDragOver(false); });
});
document.addEventListener("drop", (e) => {
  e.preventDefault();
  setDragOver(false);
  const f = e.dataTransfer.files[0];
  if (f) readFile(f);
});
</script>
</body>
</html>

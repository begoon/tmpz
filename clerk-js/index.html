<!DOCTYPE html>
<html>
    <body>
        <div id="clerk"></div>
        <script
            async
            crossorigin="anonymous"
            data-clerk-publishable-key="PUBLIC_CLERK_PUBLISHABLE_KEY"
            src="https://CLERK_FRONTEND_API/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
            type="text/javascript"
        ></script>
        <script>
            window.addEventListener("load", async function () {
                await Clerk.load();
                console.log(Clerk.user);

                if (Clerk.user) {
                    Clerk.mountUserButton(document.getElementById("clerk"));
                    const signOutButton = document.createElement("button");
                    signOutButton.textContent = "Sign Out";
                    signOutButton.onclick = async () => await Clerk.signOut();
                    document.getElementById("clerk").appendChild(signOutButton);
                } else {
                    Clerk.mountSignIn(document.getElementById("clerk"));
                }
            });
        </script>
    </body>
</html>
